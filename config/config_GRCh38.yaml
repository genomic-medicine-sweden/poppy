---
resources: "{{POPPY_HOME}}/config/resources.yaml"
samples: "samples.tsv"
units: "units.tsv"
output: "{{POPPY_HOME}}/config/output_files.yaml"

default_container: "docker://hydragenetics/common:1.10.2"

trimmer_software: "fastp_pe"

modules:
