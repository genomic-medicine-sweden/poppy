$schema: "http://json-schema.org/draft-04/schema#"
description: snakemake configuration file
type: object
properties:
  # General config
  default_container:
    type: string
    description: >
      Name or path to a default docker/singularity container
    format: uri-reference

  modules:
    type: object
    description: >
      Module versions or commit hashes

  ont_alignment:
    type: boolean
    description: if ont_alignment should be used set to true
    default: false

  output:
    type: string
    description: >
      Path to file defining workflow output files
    format: uri-reference

  pacbio_alignment:
    type: boolean
    description: if pacbio_alignment is used set to true
    default: false

  reference:
    type: object
    description: >
      Reference genome files
    properties:
      artifacts:
        type: string
        description: >
          tsv-file with artifact freq in normal samples, created with reference pipeline
        format: uri-reference
      artifacts_pindel:
        type: string
        description: >
          tsv-file with artifact freq for pindel calls in normal samples, created
          with reference pipeline
        format: uri-reference
      background:
        type: string
        description: tsv-file with background freq in normal samples, created
          with reference pipeline.
        format: uri-reference
      design_bed:
        type: string
        description: >
          Path to bed file containing panel design
        format: uri-reference
      design_intervals:
        type: string
        description: >
          Path to panel design interval file
        format: uri-reference
      design_intervals_gatk_cnv:
        type: string
        description: >
          Path to panel design interval file for GATK CNV calling, created with reference
          pipeline
        format: uri-reference
      dict:
        type: string
        description: >
          Path to genome sequence dict file
        format: uri-reference
      fai:
        type: string
        description: >
          Path to genome fasta file index
        format: uri-reference
      fasta:
        type: string
        description: >
          Path to genome fasta file
        format: uri-reference
      skip_chrs:
        type: array
        description: >
          Reference sequences that should be excluded from analysis
        items:
          type: string
    required:
      - artifacts
      - artifacts_pindel
      - background
      - design_bed
      - design_intervals
      - design_intervals_gatk_cnv
      - fai
      - fasta

  resources:
    type: string
    description: >
      Path to resources.yaml file
    format: uri-reference

  samples:
    type: string
    description: >
      Path to sample file
    format: uri-reference

  trimmer_software:
    type: string
    description: >
      Trimmer software to use

  units:
    type: string
    description: >
      Path to units file
    format: uri-reference

  # Rule-specific configs
  annotate_cnv:
    type: object
    description: >
      Annotate cnv genes in cnv vcf files
    properties:
      cnv_genes:
        type: string
        description: >
          Path to bedfile with genes to annotate in cnvreport.
        format: uri-reference
    required:
      - cnv_genes

  bcbio_variation_recall_ensemble:
    type: object
    description: >
      Configuration for the bcbio_variation_recall_ensemble rule
    properties:
      callers:
        type: array
        description: >
          Callers from which results should be ensembled
        items:
          type: string
          description: >
            Name of the caller to use
          enum:
            - gatk_mutect2
            - vardict
        minItems: 1
      container:
        type: string
        description: >
          Name or path to container containing the bcbio_variation_recall executable
        format: uri-reference
    required:
      - callers

  bcftools_annotate:
    type: object
    description: >
      Configuration for the bcftools_annotate rule
    properties:
      annotation_db:
        type: string
        description: >
          Path to VCF file containing annotation database
        format: uri-reference
    required:
      - annotation_db

  bwa_mem:
    type: object
    description: >
      Configuration for the bwa_mem rule
    properties:
      amb:
        type: string
        description: bwa amb file
        format: uri-reference
        pattern: "\\.amb$"
      ann:
        type: string
        description: bwa ann file
        format: uri-reference
        pattern: "\\.ann$"
      bwt:
        type: string
        description: bwa bwt file
        format: uri-reference
        pattern: "\\.bwt$"
      container:
        type: string
        description: >
          Name or path to container containing bwa executable
        format: uri-reference
      pac:
        type: string
        description: bwa bwt file
        format: uri-reference
        pattern: "\\.pac$"
      sa:
        type: string
        description: bwa bwt file
        format: uri-reference
        pattern: "\\.sa$"
    required:
      - amb
      - ann
      - bwt
      - pac
      - sa

  cnv_html_report:
    type: object
    description: >
      Configureation for cnv html report
    properties:
      cytobands:
        type: boolean
        description: If true cytobands will be included in report
      show_table:
        type: boolean
        description: If true cnv table will be included

  cnvkit_batch:
    type: object
    description: >
      Configuration for the cnvkit_batch rule
    properties:
      container:
        type: string
        description: >
          Name or path to container containing cnvkit executable
        format: uri-reference
      normal_reference:
        type: string
        description: >
          Path to cnvkit normal reference file (.cnn), generated with reference pipeline
        format: uri-reference
        pattern: "\\.cnn$"
      method:
        type: string
        description: >
          Sequencing protocol used
        enum:
          - hybrid
          - wgs
          - amplicon
      normal_reference:
        type: string
        description: >
          Path to cnvkit normal reference file (.cnn), generated with reference pipeline
        format: uri-reference
        pattern: "\\.cnn$"
    required:
      - method
      - normal_reference

  cnvkit_vcf:
    type: object
    description: >
      Configuration for the cnvkit_vcf rule
    properties:
      container:
        type: string
        description: >
          Name or path to container containing cnvkit executable
        format: uri-reference
      dup_limit:
        type: number
        description: copy number threshold for duplication
      het_del_limit:
        type: number
        description: copy number threshold for heterozygous deletion
      hom_del_limit:
        type: number
        description: copy number threshold for homozygous deletion

  create_artifact_file_pindel:
    type: object
    properties:
      benchmark_repeats:
        type: integer
      container:
        type: string
        format: uri-reference

  filter_vcf:
    type: object
    description: >
      Filter definitions for VCF files
    properties:
      cnv_hard_filter:
        type: string
        format: uri-reference
      germline:
        type: string
        description: >
          Path to germline filter definition
        format: uri-reference
      pindel:
        type: string
        description: >
          Path to pindel vcf filter definition
        format: uri-reference
      somatic:
        type: string
        description: >
          Path to somatic filter definition
        format: uri-reference
      somatic_hard:
        type: string
        format: uri-reference
    required:
      - germline
      - pindel
      - somatic

  gatk_collect_allelic_counts:
    type: object
    description: >
      Configuration for the gatk_collect_allelic_counts rule
    properties:
      SNP_interval:
        type: string
        description: >
          Path to file containing an interval list with backbone germline SNPs
        format: uri-reference
      container:
        type: string
        description: >
          Name or path to container containing the gatk executable
        format: uri-reference
    required:
      - SNP_interval

  gatk_denoise_read_counts:
    type: object
    description: >
      Configuration for the gatk_denoise_read_counts rule
    properties:
      container:
        type: string
        description: >
          Name or path to container containing the gatk executable
        format: uri-reference
      normal_reference:
        type: string
        description: >
          Path to GATK normal reference file (.hdf5)
        format: uri-reference
        pattern: "\\.hdf5$"
    required:
      - normal_reference

  merge_cnv_json:
    type: object
    description: >
      Configuration for the merge_cnv_json rule
    properties:
      annotations:
        type: array
        items:
          type: string
          format: uri-reference
      filtered_cnv_vcfs:
        type: array
        items:
          type: string
        description: >
          Generated during execution of Poppy
      germline_vcf:
        type: string
        description: >
          Generated during execution of Poppy
      unfiltered_cnv_vcfs:
        type: array
        items:
          type: string
        description: >
          Generated during execution of Poppy
    required:
      - annotations
      - filtered_cnv_vcfs
      - germline_vcf
      - unfiltered_cnv_vcfs

  mosdepth_bed:
    type: object
    description: >
      Config for the mosdepth_bed rule
    properties:
      container:
        type: string
        description: >
          Name or path to container containing the mosdepth executable
        format: uri-reference
      extra:
        type: string
        description: >
          Extra arguments to be passed to mosdepth
      thresholds:
        type: string
        description: >
          Three threshold values to be used as limits to calculate coverage breadth
    required:
      - thresholds

  multiqc:
    type: object
    description: >
      Config for the multiqc rule
    properties:
      container:
        type: string
        description: >
          Name or path to container containing the multiqc executable
        format: uri-reference
      reports:
        type: object
        description: >
          Logs that should be included in the multiqc report
        properties:
          DNA:
            type: object
            description: >
              Reports for DNA sequencing data
            properties:
              config:
                type: string
                description: >
                  Path to multiqc config file
                format: uri-reference
              included_unit_types:
                type: array
                description: >
                  Unit types that should be included
                items:
                  type: string
                  enum:
                    - T
                    - N
              qc_files:
                type: array
                description: >
                  Log files to include. Variables from the samples and units
                  files can be used in the file names.
                items:
                  type: string
                  format: uri-reference
            required:
              - included_unit_types
              - qc_files
        required:
          - DNA
    required:
      - reports

  pindel2vcf:
    type: object
    description: >
      Configuration for the pindel2vcf rule
    properties:
      container:
        type: string
        description: >
          Name or path to container containing the pindel executable
        format: uri-reference
      refdate:
        type: string
        description: >
          Release date of the reference genome
      refname:
        type: string
        description: >
          Name of the reference genome

  pindel_call:
    type: object
    description: >
      Configuration for the pindel_call rule
    properties:
      container:
        type: string
        description: >
          Name or path to container containing the pindel executable
        format: uri-reference
      extra:
        type: string
        description: >
          Additional command line arguments for pindel
      include_bed:
        type: string
        description: >
          BED file with regions to include in pindel analysis
    required:
      - extra
      - include_bed

  pindel_processing_add_missing_csq:
    type: object
    description: parameters for pindel_processing_add_missing_csq
    properties:
      benchmark_repeats:
        type: integer
        description: set number of times benchmark should be repeated
      container:
        type: string
        description: name or path to docker/singularity container

  pindel_processing_annotation_vep:
    type: object
    description: parameters for annotation with vep on pindel vcf, most taken
      from vep rule to ensure that pindel result is processed identical to snvs
    properties:
      benchmark_repeats:
        type: integer
        description:
          'From config["vep"]: set number of times benchmark should be
          repeated'
      container:
        type: string
        description: >
          From config["vep"]: Name of path to container containing the vep executable
        format: uri-reference
      extra:
        type: string
        description: >
          From config["vep"]: Additional command line arguments for VEP
      mode:
        type: string
        description: >
          From config["vep"]: VEP arguments for run mode
        examples:
          - "--offline --cache"
      vep_cache:
        type: string
        description: >
          From config["vep"]: Path to offline VEP cache
        format: uri-reference

  pindel_processing_artifact_annotation:
    type: object
    description: parameters for pindel_processing_artifact_annotation to add
      artifact annotation to pindel vcf
    properties:
      benchmark_repeats:
        type: integer
        description: set number of times benchmark should be repeated
      container:
        type: string
        description: name or path to docker/singularity container

  pindel_processing_fix_af:
    type: object
    description: parameters for pindel_processing_fix_af to add AF and DP values
      in INFO field of vcf
    properties:
      benchmark_repeats:
        type: integer
        description: set number of times benchmark should be repeated
      container:
        type: string
        description: name or path to docker/singularity container

  purecn:
    type: object
    description: >
      Configuration for the purecn rule
    properties:
      container:
        type: string
        description: >
          Name or path to container containing the tool executable
        format: uri-reference
      fun_segmentation:
        type: string
        description: >
          Function used for segmentation
      genome:
        type: string
        description: Reference genome build
      interval_padding:
        type: integer
        description: >
          Padding to add to intervals
      intervals:
        type: string
        format: uri-reference
        description: >
          Generated with reference pipeline
      mapping_bias_file:
        type: string
        format: uri-reference
        description: >
          Generated with reference pipeline
      normaldb:
        type: string
        format: uri-reference
        description: >
          Generated with reference pipeline
      segmentation_method:
        type: string
        description: >
          Method used for segmentation
    required:
      - fun_segmentation
      - genome
      - interval_padding
      - intervals
      - mapping_bias_file
      - normaldb
      - segmentation_method

  purecn_coverage:
    type: object
    description: >
      Configuration for the purecn_coverage rule
    properties:
      container:
        type: string
        description: >
          Name or path to container containing purecn executable
        format: uri-reference
      intervals:
        type: string
        description: Generated with reference pipeline
        format: uri-reference
    required:
      - intervals

  svdb_merge:
    type: object
    description: >
      Configuration for the svdb_merge_wo_priority rule
    properties:
      container:
        type: string
        description: >
          Name or path to container containing the svdb executable
        format: uri-reference
      extra:
        type: string
        description: >
          Additional arguments to pass to svdb
      overlap:
        type: number
        description: >
          Minimum overlap between regions for merging
      tc_method:
        type: array
        description: >
          Tumor cell content estimation methods
        minItems: 1
        items:
          type: object
          description: >
            Tumor cell content estimation method details
          properties:
            name:
              type: string
              description: >
                Name of the tumor estimation method
              example:
                - pathology
                - purecn
            cnv_caller:
              type: array
              description: >
                List of callers to be used for the method
              items:
                type: string
                description: >
                  Name of the caller to use
              minItems: 1
          required:
            - name
            - cnv_caller
    required:
      - tc_method

  svdb_query:
    type: object
    description: >
      Configuration for the svdb_query rule
    properties:
      container:
        type: string
        description: >
          Name or path to container containing the svdb executable
        format: uri-reference
      db_string:
        type: string
        description: >
          SVDB database parameters
        minLength: 1
      extra:
        type: string
        description: >
          Other command line options to pass to SVDB query
    required:
      - db_string

  vardict:
    type: object
    description: >
      Configuration for the vardict rule
    properties:
      bed_columns:
        type: string
        description: >
          Command line options defining what columns in bed file to use
      container:
        type: string
        description: >
          Name or path to container containing the vardict executable
        format: uri-reference
      extra:
        type: string
        description: >
          Additional command line arguments for vardict
    required:
      - bed_columns
      - extra

  vep:
    type: object
    description: >
      Configuration for the vep rule
    properties:
      container:
        type: string
        description: >
          Name of path to container containing the vep executable
        format: uri-reference
      extra:
        type: string
        description: >
          Additional command line arguments for VEP
      mode:
        type: string
        description: >
          VEP arguments for run mode
        examples:
          - "--offline --cache"
      vep_cache:
        type: string
        description: >
          Path to offline VEP cache
        format: uri-reference

required:
  - bcbio_variation_recall_ensemble
  - bcftools_annotate
  - bwa_mem
  - cnvkit_batch
  - cnvkit_vcf
  - default_container
  - filter_vcf
  - gatk_collect_allelic_counts
  - gatk_collect_read_counts
  - gatk_denoise_read_counts
  - merge_cnv_json
  - modules
  - mosdepth_bed
  - multiqc
  - output
  - pindel2vcf
  - pindel_call
  - purecn
  - purecn_coverage
  - reference
  - resources
  - samples
  - svdb_merge
  - svdb_query
  - trimmer_software
  - units
  - vardict
  - vep
